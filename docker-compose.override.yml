services:
  api:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8001:8000"

  worker:
    volumes:
      - .:/app

  beat:
    volumes:
      - .:/app

  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"
